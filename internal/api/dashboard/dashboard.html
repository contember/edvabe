<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>edvabe dashboard</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d1117;--surface:#161b22;--border:#30363d;
  --text:#e6edf3;--text-dim:#8b949e;--text-muted:#484f58;
  --green:#3fb950;--yellow:#d29922;--red:#f85149;--blue:#58a6ff;
  --font:ui-monospace,SFMono-Regular,"SF Mono",Menlo,Consolas,monospace;
}
html{font-family:var(--font);font-size:14px;background:var(--bg);color:var(--text)}
body{max-width:1280px;margin:0 auto;padding:24px 16px}

header{display:flex;align-items:baseline;gap:12px;margin-bottom:24px}
header h1{font-size:18px;font-weight:600;letter-spacing:-.02em}
header .version{color:var(--text-dim);font-size:12px}
header .refresh-indicator{margin-left:auto;color:var(--text-muted);font-size:12px}

.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:28px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:16px}
.card .label{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--text-dim);margin-bottom:4px}
.card .value{font-size:28px;font-weight:600}
.card .value.green{color:var(--green)}
.card .value.yellow{color:var(--yellow)}
.card .value.blue{color:var(--blue)}
.card .sub{font-size:11px;color:var(--text-muted);margin-top:4px}

section{margin-bottom:28px}
section h2{font-size:14px;font-weight:600;margin-bottom:10px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.04em}

table{width:100%;border-collapse:collapse;background:var(--surface);border:1px solid var(--border);border-radius:8px;overflow:hidden}
th,td{padding:8px 12px;text-align:left;border-bottom:1px solid var(--border);font-size:13px;white-space:nowrap}
th{color:var(--text-dim);font-weight:500;font-size:11px;text-transform:uppercase;letter-spacing:.04em;background:var(--bg)}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(136,198,255,.04)}

.state{display:inline-block;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:600;text-transform:uppercase}
.state-running{background:rgba(63,185,80,.15);color:var(--green)}
.state-paused{background:rgba(210,153,34,.15);color:var(--yellow)}
.pause-mode{display:inline-block;margin-left:6px;padding:1px 6px;border-radius:10px;font-size:10px;font-weight:500;text-transform:lowercase;letter-spacing:.02em;background:rgba(88,166,255,.12);color:var(--blue)}
.pause-mode-stopped{background:rgba(132,141,151,.18);color:var(--text-dim)}

.build-status{font-size:11px;font-weight:600;text-transform:uppercase}
.build-ready{color:var(--green)}
.build-building,.build-waiting{color:var(--yellow)}
.build-error{color:var(--red)}

.meta{font-size:11px;color:var(--text-dim);max-width:200px;overflow:hidden;text-overflow:ellipsis}
.mono{font-family:var(--font);font-size:12px}
.id-cell{max-width:180px;overflow:hidden;text-overflow:ellipsis}

.mem{font-variant-numeric:tabular-nums;font-size:12px}
.mem-dim{color:var(--text-muted)}

.actions{display:flex;gap:4px;justify-content:flex-end}
.btn{
  background:transparent;border:1px solid var(--border);color:var(--text-dim);
  padding:3px 10px;border-radius:6px;cursor:pointer;font-size:11px;font-family:var(--font);
  transition:all .15s;
}
.btn:hover{color:var(--text)}
.btn:disabled{opacity:.35;cursor:not-allowed}
.btn-pause:hover{border-color:var(--yellow);color:var(--yellow)}
.btn-stop:hover{border-color:var(--blue);color:var(--blue)}
.btn-resume:hover{border-color:var(--green);color:var(--green)}
.btn-delete:hover{border-color:var(--red);color:var(--red)}

.empty{text-align:center;padding:32px;color:var(--text-muted);font-size:13px}
.ttl{font-variant-numeric:tabular-nums}
.ttl-warn{color:var(--yellow)}
.ttl-crit{color:var(--red)}
</style>
</head>
<body>

<header>
  <h1>edvabe</h1>
  <span class="version">dashboard</span>
  <span class="refresh-indicator" id="refresh-indicator"></span>
</header>

<div class="cards" id="cards"></div>

<section>
  <h2>Sandboxes</h2>
  <div id="sandbox-table"></div>
</section>

<section>
  <h2>Templates</h2>
  <div id="template-table"></div>
</section>

<script>
const REFRESH_MS = 3000;

function formatAge(isoStr) {
  const d = new Date(isoStr);
  const sec = Math.floor((Date.now() - d.getTime()) / 1000);
  if (sec < 60) return sec + 's ago';
  if (sec < 3600) return Math.floor(sec / 60) + 'm ago';
  if (sec < 86400) return Math.floor(sec / 3600) + 'h ago';
  return Math.floor(sec / 86400) + 'd ago';
}

function formatTTL(expiresAt) {
  const sec = Math.floor((new Date(expiresAt).getTime() - Date.now()) / 1000);
  if (sec <= 0) return { text: 'expired', cls: 'ttl-crit' };
  if (sec < 60) return { text: sec + 's', cls: sec < 30 ? 'ttl-crit' : 'ttl-warn' };
  const m = Math.floor(sec / 60);
  const s = sec % 60;
  const text = m + 'm ' + String(s).padStart(2, '0') + 's';
  return { text, cls: m < 1 ? 'ttl-warn' : '' };
}

function formatMeta(meta) {
  if (!meta || Object.keys(meta).length === 0) return '';
  return Object.entries(meta).map(([k, v]) => k + '=' + v).join(', ');
}

function formatDuration(sec) {
  if (!sec || sec < 0) return 'disabled';
  if (sec < 60) return sec + 's';
  if (sec < 3600) return Math.floor(sec / 60) + 'm';
  if (sec < 86400) return Math.floor(sec / 3600) + 'h';
  return Math.floor(sec / 86400) + 'd';
}

function formatMiB(mib) {
  if (!mib || mib <= 0) return '';
  if (mib < 1024) return mib + ' MiB';
  return (mib / 1024).toFixed(1) + ' GiB';
}

function renderCards(summary, policy) {
  const pauseSub = summary.paused > 0
    ? `<div class="sub">${summary.frozen} in memory · ${summary.stopped} on disk</div>`
    : '';
  const memSub = summary.totalMemoryUsedMiB > 0
    ? `<div class="sub">across ${summary.running + summary.frozen} live</div>`
    : '';
  const policyLine = policy
    ? `freeze ${formatDuration(policy.freezeDurationSec)} · max ${policy.maxFrozen} frozen · gc ${formatDuration(policy.stoppedGCAfterSec)}`
    : '';
  document.getElementById('cards').innerHTML = `
    <div class="card"><div class="label">Total sandboxes</div><div class="value">${summary.totalSandboxes}</div></div>
    <div class="card"><div class="label">Running</div><div class="value green">${summary.running}</div></div>
    <div class="card"><div class="label">Paused</div><div class="value yellow">${summary.paused}</div>${pauseSub}</div>
    <div class="card"><div class="label">RAM used</div><div class="value blue">${formatMiB(summary.totalMemoryUsedMiB) || '—'}</div>${memSub}</div>
    <div class="card"><div class="label">Templates</div><div class="value">${summary.totalTemplates}</div></div>
  `;
  const indicator = document.getElementById('refresh-indicator');
  indicator.title = 'pause policy: ' + policyLine;
}

function actionsFor(s) {
  // Explicit empty disabled buttons keep columns aligned across rows.
  const running = s.state === 'running';
  const frozen = s.state === 'paused' && s.pauseMode === 'frozen';
  const stopped = s.state === 'paused' && s.pauseMode === 'stopped';
  const btn = (action, label, enabled, cls) =>
    `<button class="btn ${cls}" data-action="${action}" data-id="${s.id}" ${enabled ? '' : 'disabled'}>${label}</button>`;
  const pauseOrResume = running
    ? btn('pause', 'pause', true, 'btn-pause')
    : btn('resume', 'resume', frozen || stopped, 'btn-resume');
  const stopBtn = btn('stop', 'stop', running || frozen, 'btn-stop');
  const deleteBtn = btn('delete', 'delete', true, 'btn-delete');
  return `<div class="actions">${pauseOrResume}${stopBtn}${deleteBtn}</div>`;
}

function renderSandboxes(sandboxes) {
  const el = document.getElementById('sandbox-table');
  if (sandboxes.length === 0) {
    el.innerHTML = '<div class="empty">No sandboxes running</div>';
    return;
  }
  let html = `<table>
    <thead><tr>
      <th>ID</th><th>Template</th><th>State</th><th>Created</th><th>TTL</th><th>Memory</th><th>Metadata</th><th></th>
    </tr></thead><tbody>`;
  for (const s of sandboxes) {
    let ttl;
    if (s.state === 'paused') {
      ttl = { text: 'paused · ' + (s.pausedAt ? formatAge(s.pausedAt) : ''), cls: '' };
    } else {
      ttl = formatTTL(s.expiresAt);
    }
    let modeBadge = '';
    if (s.state === 'paused' && s.pauseMode) {
      const cls = s.pauseMode === 'stopped' ? 'pause-mode pause-mode-stopped' : 'pause-mode';
      const label = s.pauseMode === 'stopped' ? 'disk' : 'memory';
      modeBadge = `<span class="${cls}" title="${s.pauseMode}">${label}</span>`;
    }
    let memCell = '<span class="mem-dim">—</span>';
    if (s.memoryUsedMiB > 0) {
      const limit = s.memoryLimitMiB > 0 ? ' / ' + formatMiB(s.memoryLimitMiB) : '';
      memCell = formatMiB(s.memoryUsedMiB) + limit;
    } else if (s.state === 'paused' && s.pauseMode === 'stopped') {
      memCell = '<span class="mem-dim">0 (stopped)</span>';
    }
    const meta = formatMeta(s.metadata);
    html += `<tr>
      <td class="mono id-cell" title="${s.id}">${s.id}</td>
      <td class="mono">${s.templateID}${s.alias ? ' <span class="meta">(' + s.alias + ')</span>' : ''}</td>
      <td><span class="state state-${s.state}">${s.state}</span>${modeBadge}</td>
      <td title="${s.createdAt}">${formatAge(s.createdAt)}</td>
      <td class="ttl ${ttl.cls}">${ttl.text}</td>
      <td class="mem">${memCell}</td>
      <td class="meta" title="${meta}">${meta || '<span style="color:var(--text-muted)">&mdash;</span>'}</td>
      <td>${actionsFor(s)}</td>
    </tr>`;
  }
  html += '</tbody></table>';
  el.innerHTML = html;
}

function renderTemplates(templates) {
  const el = document.getElementById('template-table');
  if (templates.length === 0) {
    el.innerHTML = '<div class="empty">No templates registered</div>';
    return;
  }
  let html = `<table>
    <thead><tr>
      <th>Alias</th><th>Name</th><th>Image</th><th>Build</th><th>Created</th>
    </tr></thead><tbody>`;
  for (const t of templates) {
    const buildCls = t.latestBuildStatus ? 'build-' + t.latestBuildStatus : '';
    html += `<tr>
      <td class="mono">${t.alias || t.id}</td>
      <td>${t.name || '<span style="color:var(--text-muted)">&mdash;</span>'}</td>
      <td class="mono meta">${t.imageTag || '&mdash;'}</td>
      <td><span class="build-status ${buildCls}">${t.latestBuildStatus || '&mdash;'}</span></td>
      <td title="${t.createdAt}">${formatAge(t.createdAt)}</td>
    </tr>`;
  }
  html += '</tbody></table>';
  el.innerHTML = html;
}

async function fetchOverview() {
  try {
    const resp = await fetch('/dashboard/api/overview');
    if (!resp.ok) throw new Error(resp.statusText);
    const data = await resp.json();
    renderCards(data.summary, data.pausePolicy);
    renderSandboxes(data.sandboxes);
    renderTemplates(data.templates);
    document.getElementById('refresh-indicator').textContent =
      'updated ' + new Date().toLocaleTimeString();
  } catch (e) {
    document.getElementById('refresh-indicator').textContent = 'fetch failed';
  }
}

async function doAction(id, action) {
  const confirmMsg = {
    delete: 'Delete sandbox ' + id + '? This destroys the container.',
    stop: 'Force-stop sandbox ' + id + '? In-memory state will be lost.',
  }[action];
  if (confirmMsg && !confirm(confirmMsg)) return;
  try {
    const path = '/dashboard/api/sandboxes/' + id + (action === 'delete' ? '' : '/' + action);
    const method = action === 'delete' ? 'DELETE' : 'POST';
    const resp = await fetch(path, { method });
    if (!resp.ok && resp.status !== 204) {
      let msg = resp.statusText;
      try { msg = (await resp.json()).error || msg; } catch (_) {}
      throw new Error(msg);
    }
    fetchOverview();
  } catch (e) {
    alert('Action ' + action + ' failed: ' + e.message);
  }
}

document.addEventListener('click', (e) => {
  const btn = e.target.closest('button[data-action]');
  if (!btn || btn.disabled) return;
  doAction(btn.dataset.id, btn.dataset.action);
});

fetchOverview();
setInterval(fetchOverview, REFRESH_MS);
</script>
</body>
</html>
